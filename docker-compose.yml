services:
  postgres:
    image: postgres:16
    container_name: nomina360-postgres
    restart: always
    environment:
      POSTGRES_USER: nomina360
      POSTGRES_PASSWORD: nomina360_dev
      POSTGRES_DB: nomina360
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: nomina360-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: